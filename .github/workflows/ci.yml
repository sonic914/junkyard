name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: API E2E Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: evacycle_test
          POSTGRES_USER: evacycle_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Start MinIO
        run: |
          docker run -d \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --name minio \
            minio/minio:latest server /data
          sleep 5

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: src/evacycle
        run: npm ci

      - name: Generate Prisma client
        working-directory: src/evacycle/apps/api
        run: npx prisma generate

      - name: Run DB migration
        working-directory: src/evacycle/apps/api
        env:
          DATABASE_URL: postgresql://evacycle_user:test_password@localhost:5432/evacycle_test
        run: npx prisma db push --force-reset --accept-data-loss

      - name: Run E2E tests
        working-directory: src/evacycle/apps/api
        env:
          NODE_ENV: test
          PORT: 3000
          DATABASE_URL: postgresql://evacycle_user:test_password@localhost:5432/evacycle_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          REDIS_DB: 0
          JWT_SECRET: test-jwt-secret
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_SECRET: test-refresh-secret
          JWT_REFRESH_EXPIRES_IN: 7d
          MINIO_ENDPOINT: localhost
          MINIO_PORT: 9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: evacycle
          MINIO_USE_SSL: false
          CORS_ORIGIN: http://localhost:3001
        run: npm test -- --forceExit --testTimeout=30000

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: src/evacycle
        run: npm ci

      - name: Generate Prisma client
        working-directory: src/evacycle/apps/api
        run: npx prisma generate

      - name: Build API
        id: build-api
        working-directory: src/evacycle/apps/api
        continue-on-error: true
        run: |
          npx tsc -p tsconfig.build.json 2>&1 | tee /tmp/build-errors.txt
          exit ${PIPESTATUS[0]}

      - name: Send build error to Telegram
        if: steps.build-api.outcome == 'failure'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          ERROR=$(head -50 /tmp/build-errors.txt | tr '\n' '|')
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_TO}" \
            -d "text=❌ Build API 실패 로그: ${ERROR}"

      - name: Fail if build failed
        if: steps.build-api.outcome == 'failure'
        run: exit 1

      - name: Build Web
        working-directory: src/evacycle/apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  notify:
    name: Telegram Notify
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always()

    steps:
      - name: Send result to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ (needs.test.result == 'success' && needs.build.result == 'success') && '✅' || '❌' }} *EVACYCLE CI 결과*

            📌 브랜치: `${{ github.ref_name }}`
            💬 커밋: ${{ github.event.head_commit.message }}
            👤 작성자: ${{ github.actor }}

            🧪 테스트: ${{ needs.test.result == 'success' && '통과 ✅' || '실패 ❌' }}
            🏗️ 빌드: ${{ needs.build.result == 'success' && '성공 ✅' || '실패 ❌' }}

            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
