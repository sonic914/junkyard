version: '3.9'

# ─── EVACYCLE 프로덕션 Docker Compose (NAS 배포용) ─────────────────────────────
#
# 사용법:
#   cp .env.prod.example .env.prod
#   # .env.prod 값 설정 후
#   ./deploy.sh
#
# 네트워크: evacycle_prod (서비스 간 내부 통신)
# 볼륨:    postgres_data, redis_data, minio_data (NAS 영구 저장)

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: evacycle_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-evacycle}
      POSTGRES_USER:     ${POSTGRES_USER:-evacycle_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evacycle_prod
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-evacycle_user} -d ${POSTGRES_DB:-evacycle}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: evacycle_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - evacycle_prod
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: evacycle_minio_prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:            ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD:        ${MINIO_SECRET_KEY}
      MINIO_API_CORS_ALLOW_ORIGIN: ${CORS_ORIGIN:-https://evacycle.local}
    ports:
      - '${MINIO_CONSOLE_PORT:-9001}:9001'   # 콘솔만 외부 노출 (API는 내부)
    volumes:
      - minio_data:/data
    networks:
      - evacycle_prod
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── NestJS API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: evacycle_api_prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV:          production
      DATABASE_URL:      postgresql://${POSTGRES_USER:-evacycle_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-evacycle}
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      MINIO_ENDPOINT:    minio
      MINIO_PORT:        9000
      MINIO_USE_SSL:     'false'
      CORS_ORIGIN:       ${CORS_ORIGIN}
      PORT:              3000
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - evacycle_prod

  # ── Next.js 프론트엔드 ─────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3000}
    container_name: evacycle_web_prod
    restart: unless-stopped
    environment:
      NODE_ENV:              production
      PORT:                  3001
      NEXT_PUBLIC_API_URL:   ${NEXT_PUBLIC_API_URL}
    ports:
      - '${WEB_PORT:-3001}:3001'
    depends_on:
      - api
    networks:
      - evacycle_prod

# ─── 볼륨 (NAS 영구 저장) ──────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ─── 네트워크 ──────────────────────────────────────────────────────────────────
networks:
  evacycle_prod:
    driver: bridge
