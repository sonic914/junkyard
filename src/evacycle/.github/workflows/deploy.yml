# .github/workflows/deploy.yml
name: CD — Deploy to NAS

on:
  push:
    branches: [main]

  # 수동 배포 (긴급 재배포 / 캐시 무시)
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Docker 캐시 무시 (--no-cache)'
        required: false
        default: 'false'
        type: boolean

# 동시 배포 방지
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to NAS (Self-hosted)
    # NAS에 설치된 Runner 사용 — 내부망 문제 해소
    runs-on: [self-hosted, nas, evacycle]
    timeout-minutes: 30

    steps:
      # ── 1. 배포 시작 로그 ──────────────────────────────────────
      - name: 배포 시작
        run: |
          echo "======================================"
          echo " EVACYCLE CD 배포 시작"
          echo " 커밋: ${{ github.sha }}"
          echo " 작성자: ${{ github.actor }}"
          echo " 시각: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "======================================"

      # ── 2. 최신 코드 pull ──────────────────────────────────────
      - name: 최신 코드 가져오기
        working-directory: ${{ secrets.NAS_DEPLOY_PATH }}
        run: |
          echo "📥 최신 코드 pull 중..."
          git pull origin main

      # ── 3. deploy.sh 실행 ──────────────────────────────────────
      - name: NAS 배포 실행
        working-directory: ${{ secrets.NAS_DEPLOY_PATH }}
        run: |
          CACHE_FLAG=""
          if [ "${{ github.event.inputs.no_cache }}" = "true" ]; then
            CACHE_FLAG="--no-cache"
            echo "⚙️  --no-cache 모드"
          fi
          bash deploy.sh $CACHE_FLAG

      # ── 4. 배포 결과 확인 ──────────────────────────────────────
      - name: 서비스 상태 확인
        if: success()
        working-directory: ${{ secrets.NAS_DEPLOY_PATH }}
        run: |
          echo "📋 실행 중인 컨테이너:"
          docker compose -f docker-compose.prod.yml ps
          echo ""
          echo "✅ 배포 완료 — 커밋: ${{ github.sha }}"

      # ── 5. 실패 시 롤백 ───────────────────────────────────────
      - name: 실패 시 롤백 처리
        if: failure()
        working-directory: ${{ secrets.NAS_DEPLOY_PATH }}
        run: |
          echo "❌ 배포 실패. deploy.sh --rollback 으로 롤백 시도..."
          bash deploy.sh --rollback || {
            echo "❌❌ 롤백도 실패. 수동 확인 필요!"
            echo "    docker logs evacycle-api --tail 50"
            exit 1
          }
